<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-1: #0a1020;
            --bg-2: #111827;
            --accent: #38bdf8;
            --accent-2: #34d399;
            --card-border: rgba(255, 255, 255, 0.08);
            --text-soft: #c8d2ef;
            --surface: rgba(15, 23, 42, 0.72);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at 12% 8%, rgba(56, 189, 248, 0.13), transparent 32%),
                radial-gradient(circle at 92% 8%, rgba(52, 211, 153, 0.12), transparent 28%),
                linear-gradient(165deg, var(--bg-1), var(--bg-2));
            color: #f8fafc;
        }

        main {
            flex: 1;
        }

        .navbar {
            backdrop-filter: blur(10px);
            background: rgba(10, 15, 30, 0.8) !important;
        }

        .hero {
            padding: 4.5rem 0 3rem;
        }

        .hero-badge {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            padding: 0.35rem 0.8rem;
            font-size: 0.85rem;
            color: var(--text-soft);
            display: inline-flex;
            gap: 0.5rem;
            align-items: center;
        }

        .hero-title {
            font-size: clamp(2rem, 5vw, 3.6rem);
            line-height: 1.08;
            margin: 1.1rem 0;
        }

        .hero-subtitle {
            max-width: 720px;
            color: var(--text-soft);
            font-size: 1.05rem;
        }

        .main-card {
            border: 1px solid var(--card-border);
            background: var(--surface);
            border-radius: 14px;
            padding: 1.3rem;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 209, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .main-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 209, 255, 0.3);
            box-shadow: 0 12px 24px rgba(0, 209, 255, 0.15);
        }

        .main-card:hover::before {
            left: 100%;
        }

        .features-row {
            max-width: 1080px;
            margin: 0 auto;
        }

        .content-shell {
            border: 1px solid var(--card-border);
            background: rgba(15, 23, 42, 0.78);
            border-radius: 16px;
            padding: 1.4rem;
            margin: 2rem 0 4rem;
        }

        .section-kicker {
            color: var(--accent-2);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .page-section {
            padding: 2.5rem 0;
        }

        .muted-copy {
            color: var(--text-soft);
        }

        .step-number {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            border: 1px solid rgba(56, 189, 248, 0.28);
            font-weight: 700;
            flex: 0 0 auto;
        }

        .info-list {
            list-style: none;
            padding-left: 0;
            margin-bottom: 0;
        }

        .info-list li {
            display: flex;
            gap: 0.65rem;
            margin-bottom: 0.8rem;
            color: var(--text-soft);
        }

        .info-list li:last-child {
            margin-bottom: 0;
        }

        .info-list i {
            color: var(--accent-2);
            margin-top: 0.1rem;
        }

        .icon-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 209, 255, 0.14);
            color: var(--accent);
            font-size: 1.1rem;
        }

        footer {
            color: #b0bddf;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(8, 12, 24, 0.65);
            margin-top: auto;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #00a8cc);
            border: 1px solid rgba(0, 209, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 209, 255, 0.3);
            background: linear-gradient(135deg, #00e5ff, var(--accent));
        }

        .btn-primary:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .navbar-brand {
            transition: all 0.3s ease;
        }

        .navbar-brand:hover {
            color: var(--accent) !important;
            transform: scale(1.05);
        }

        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-link:hover::after {
            width: 80%;
        }

        .nav-link:hover {
            color: var(--accent) !important;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out;
        }

        .icon-circle {
            transition: all 0.3s ease;
        }

        .icon-circle:hover {
            transform: scale(1.1) rotate(5deg);
            background: rgba(0, 209, 255, 0.2);
        }

        .component-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .component-card:hover {
            transform: translateY(-6px);
        }

        .component-card:hover .component-name {
            color: var(--accent);
        }

        .component-price {
            font-variant-numeric: tabular-nums;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            color: white;
        }

        .form-select {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-select option {
            background: #111827;
            color: white;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(0, 209, 255, 0.25);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(203, 213, 225, 0.62);
        }

        .fps-game-card {
            transition: all 0.3s ease;
        }

        .fps-game-card:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(0, 209, 255, 0.1);
        }

        #fps-search:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(0, 209, 255, 0.25);
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: clamp(1.5rem, 4vw, 2.5rem);
            }
            
            .main-card {
                padding: 1rem;
                margin-bottom: 1rem;
            }
            
            .component-card:hover {
                transform: translateY(-2px);
            }
            
            .btn-lg {
                padding: 0.75rem 1.5rem;
                font-size: 1rem;
            }
            
            .fps-game-card {
                margin-bottom: 1rem;
            }
            
            .icon-circle {
                width: 36px;
                height: 36px;
                font-size: 0.9rem;
            }
            
            .content-shell {
                padding: 0.75rem;
                margin: 1rem 0;
            }

            .page-section {
                padding: 1.6rem 0;
            }
        }

        @media (max-width: 576px) {
            .hero {
                padding: 3rem 0 2rem;
            }
            
            .main-card {
                padding: 0.75rem;
            }
            
            .component-name {
                font-size: 0.85rem;
            }
            
            .component-price {
                font-size: 0.95rem;
            }
            
            .btn-sm {
                font-size: 0.7rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-md sticky-top border-bottom" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <span class="icon-circle" style="width:34px;height:34px;font-size:0.95rem;">
                    <i class="bi bi-pc-display"></i>
                </span>
                <span class="fw-semibold">PC Configurator</span> 
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto gap-md-2">
                    <li class="nav-item"><a class="nav-link text-white" href="/builder/">Собрать конфигурацию</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/how-it-works/">Как работает</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/about/">О нас</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="/maintenance/">Поддержка</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="py-3">
        <div class="container small d-flex flex-column flex-md-row justify-content-between gap-2">
            <span>PC Configurator — учебный проект по подбору комплектующих.</span>
            <span class="text-secondary">Данные цен и FPS используются для демонстрации работы сервиса.</span>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
